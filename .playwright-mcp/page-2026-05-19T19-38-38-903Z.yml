            - paragraph [ref=e145]: How do Salesforce agents select the right topic from their list of topics and know which action to pick?
          - generic [ref=e146]:
            - generic [ref=e147]: Agent Topic Selection
            - generic [ref=e148]: 90%
          - paragraph [ref=e152]: • Agentforce uses the **Atlas Reasoning Engine** as its decision brain. When a user message arrives, the engine first runs **topic (now called subagent) classification** — comparing the utterance to each subagent's name and **classification description** — and falls back to an 'off-topic' subagent if nothing matches confidently.